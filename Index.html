<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคำนวณค่าอาหาร (เวอร์ชันเพิ่ม VAT + ส่วนลด)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .form-control {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
        }
        input[type="number"], input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #27ae60;
        }
        .btn-add {
            background-color: #3498db;
            margin-bottom: 15px;
        }
        .btn-add:hover {
            background-color: #2980b9;
        }
        .btn-danger {
            background-color: #e74c3c;
            padding: 5px 10px;
            font-size: 12px;
        }
        .btn-danger:hover {
            background-color: #c0392b;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            font-size: 14px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
        }
        .txt-red {
            color: #e74c3c;
            font-weight: bold;
        }
        .summary-box {
            background-color: #ebf5fb;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-weight: bold;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            gap: 10px;
        }
        .total-row {
            background-color: #fdfefe;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍽️ เครื่องคำนวณค่าอาหาร + VAT + ส่วนลด</h2>
    
    <!-- ส่วนใส่ข้อมูลหลัก -->
    <div class="input-group">
        <div class="form-control">
            <label>ตั้งค่า VAT / Service Charge (%):</label>
            <input type="number" id="vatPercentInput" value="10" placeholder="เช่น 7 หรือ 10" oninput="calculateAll()">
        </div>
        <div class="form-control">
            <label>ส่วนลดรวมทั้งหมด (บาท):</label>
            <input type="number" id="totalDiscount" placeholder="เช่น 200" oninput="calculateAll()">
        </div>
        <div class="form-control">
            <label>ยอดรวมก่อนแวต (ดูเพื่อเช็กบิล):</label>
            <input type="number" id="checkTotalAmount" placeholder="ยอดรวมอาหารดิบ" style="background-color: #f9f9f9;" readonly>
        </div>
    </div>

    <div class="summary-box">
        <span>รวมยอดหลัง VAT: <span id="totalWithVatText" style="color:#2980b9;">0.00</span> บาท</span>
        <span>ส่วนลดคิดเป็น: <span id="discountPercentText" style="color:#e67e22;">0.0000</span> %</span>
        <span>ยอดจ่ายสุทธิทั้งหมด: <span id="netPayableText" style="color:#27ae60;">0.00</span> บาท</span>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 25px 0;">

    <h3>รายชื่อและค่าอาหารของแต่ละคน</h3>
    <button class="btn btn-add" onclick="addPersonRow()">➕ เพิ่มคน / รายการอาหาร</button>

    <!-- ตารางแสดงผล -->
    <table>
        <thead>
            <tr>
                <th>ชื่อ / รายการ</th>
                <th>ค่าอาหารเดิม (บาท)</th>
                <th id="vatHeader">Vat 10%</th>
                <th>รวม Vat</th>
                <th>ส่วนลด (บาท)</th>
                <th class="txt-red">จ่ายจริง (บาท)</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="personTableBody">
            <!-- แถวข้อมูลถูกเติมโดย JavaScript -->
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td>ยอดรวม (Total)</td>
                <td id="sumOriginal">0.00</td>
                <td id="sumVat">0.00</td>
                <td id="sumWithVat">0.00</td>
                <td id="sumDiscount">0.00</td>
                <td id="sumFinal" class="txt-red">0.00</td>
                <td>-</td>
            </tr>
        </tfoot>
    </table>
</div>

<script>
    // โหลดค่าตัวอย่างตามรูปภาพที่ส่งมาล่าสุด
    window.onload = function() {
        addPersonRow(285);
        addPersonRow(199);
        addPersonRow(199);
        addPersonRow(139);
        addPersonRow(139);
        
        document.getElementById('vatPercentInput').value = 10;
        document.getElementById('totalDiscount').value = 200;
        calculateAll();
    };

    // ฟังก์ชันเพิ่มแถว
    function addPersonRow(initialValue = '') {
        const tbody = document.getElementById('personTableBody');
        const rowCount = tbody.rows.length + 1;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" placeholder="คนที่ ${rowCount}" style="width:90px; padding:5px; border-radius:4px; border:1px solid #ccc;"></td>
            <td><input type="number" class="person-cost" value="${initialValue}" placeholder="0.00" style="width:110px; padding:5px; border-radius:4px; border:1px solid #ccc;" oninput="calculateAll()"></td>
            <td class="row-vat">0.00</td>
            <td class="row-with-vat">0.00</td>
            <td class="row-discount">0.00</td>
            <td class="row-final txt-red">0.00</td>
            <td><button class="btn btn-danger" onclick="removeRow(this)">ลบ</button></td>
        `;
        tbody.appendChild(tr);
        calculateAll();
    }

    // ฟังก์ชันลบแถว
    function removeRow(button) {
        button.closest('tr').remove();
        calculateAll();
    }

    // ฟังก์ชันคำนวณหลัก
    function calculateAll() {
        const vatPercent = parseFloat(document.getElementById('vatPercentInput').value) || 0;
        const totalDiscount = parseFloat(document.getElementById('totalDiscount').value) || 0;
        
        // อัปเดตหัวตารางตาม % ที่ตั้งไว้
        document.getElementById('vatHeader').innerText = `Vat ${vatPercent}%`;

        const rows = document.querySelectorAll('#personTableBody tr');
        
        let sumOriginal = 0;
        let sumVat = 0;
        let sumWithVat = 0;

        // ขั้นที่ 1: คำนวณหาผลรวมราคารวม VAT ของทุกคนก่อนเพื่อหาเปอร์เซ็นต์ส่วนลด
        rows.forEach(row => {
            const cost = parseFloat(row.querySelector('.person-cost').value) || 0;
            const vat = (cost * vatPercent) / 100;
            const costWithVat = cost + vat;

            sumOriginal += cost;
            sumVat += vat;
            sumWithVat += costWithVat;
        });

        // แสดงยอดรวมดิบในช่อง Input
        document.getElementById('checkTotalAmount').value = sumOriginal.toFixed(2);
        document.getElementById('totalWithVatText').innerText = sumWithVat.toFixed(2);

        // ขั้นที่ 2: คำนวณหา % ส่วนลด จากยอดรวมที่บวก VAT แล้ว (สูตร: ส่วนลด / ยอดรวมหลัง Vat * 100)
        let discountPercent = 0;
        if (sumWithVat > 0) {
            discountPercent = (totalDiscount / sumWithVat) * 100;
        }
        document.getElementById('discountPercentText').innerText = discountPercent.toFixed(4);
        document.getElementById('netPayableText').innerText = (sumWithVat - totalDiscount).toFixed(2);

        // ขั้นที่ 3: คำนวณกระจายยอดแต่ละคนลงตาราง
        let totalFinalSum = 0;
        let totalDiscountSum = 0;

        rows.forEach(row => {
            const cost = parseFloat(row.querySelector('.person-cost').value) || 0;
            const vat = (cost * vatPercent) / 100;
            const costWithVat = cost + vat;

            // คำนวณส่วนลดที่คนนี้จะได้รับ (คิดจากสัดส่วนยอดรวม Vat)
            const personDiscount = (costWithVat * discountPercent) / 100;
            const finalPay = costWithVat - personDiscount;

            // แสดงผลลัพธ์ในแต่ละแถว (ปรับทศนิยมตามความละเอียดในตาราง excel ของคุณ)
            row.querySelector('.row-vat').innerText = vat.toFixed(1);
            row.querySelector('.row-with-vat').innerText = costWithVat.toFixed(1);
            row.querySelector('.row-discount').innerText = personDiscount.toFixed(6); // แสดงทศนิยมละเอียดตามรูป
            row.querySelector('.row-final').innerText = finalPay.toFixed(4); // แสดงยอดจ่ายทศนิยม 4 ตำแหน่ง

            totalDiscountSum += personDiscount;
            totalFinalSum += finalPay;
        });

        // อัปเดตแถวสรุปผลรวมด้านล่างสุด (Footer)
        document.getElementById('sumOriginal').innerText = sumOriginal.toFixed(0);
        document.getElementById('sumVat').innerText = sumVat.toFixed(1);
        document.getElementById('sumWithVat').innerText = sumWithVat.toFixed(1);
        document.getElementById('sumDiscount').innerText = totalDiscountSum.toFixed(0);
        document.getElementById('sumFinal').innerText = totalFinalSum.toFixed(1);
    }
</script>

</body>
</html>
