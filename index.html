<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ระบบคำนวณค่าอาหาร</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 0;
            color: #333;
            display: flex;
            justify-content: center;
        }
        /* ล็อกขนาดหน้าจอให้เท่ากับมือถือ (กว้างไม่เกิน 480px) */
        .container {
            width: 100%;
            max-width: 480px; 
            min-height: 100vh;
            background: #fff;
            padding: 20px 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 22px;
        }
        h3 {
            font-size: 16px;
            margin-top: 20px;
            margin-bottom: 10px;
        }
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        .form-control {
            display: flex;
            flex-direction: column;
        }
        .form-control.full-width {
            grid-column: span 2;
        }
        label {
            font-weight: bold;
            margin-bottom: 6px;
            color: #555;
            font-size: 13px;
        }
        input[type="number"], input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            width: 100%;
        }
        .btn {
            background-color: #2ecc71;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #27ae60;
        }
        .btn-add {
            background-color: #3498db;
            margin-bottom: 15px;
        }
        .btn-add:hover {
            background-color: #2980b9;
        }
        .btn-danger {
            background-color: #e74c3c;
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 6px;
        }
        .btn-danger:hover {
            background-color: #c0392b;
        }
        
        /* ปรับแต่งตารางให้แสดงผลบนมือถือได้พอดี ไม่ล้นจอ */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 450px; /* บังคับความกว้างตารางขั้นต่ำเพื่อให้เลื่อนดูได้ไม่เบียดกัน */
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px 6px;
            text-align: center;
            font-size: 13px;
        }
        th {
            background-color: #f8f9fa;
            color: #333;
        }
        .txt-red {
            background-color: #fff9f9;
            color: #e74c3c;
            font-weight: bold;
        }
        .summary-box {
            background-color: #ebf5fb;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .summary-row {
            display: flex;
            justify-content: space-between;
        }
        .total-row {
            background-color: #fdfefe;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🍽️ คำนวณค่าอาหาร</h2>
    
    <!-- ส่วนตั้งค่าหลัก -->
    <div class="input-group">
        <!-- เพิ่มช่องกรอกชื่อร้านอาหาร -->
        <div class="form-control full-width">
            <label>ชื่อร้านอาหาร :</label>
            <input type="text" id="restaurantNameInput" placeholder="ระบุชื่อร้านอาหาร">
        </div>
        <div class="form-control">
            <label>ตั้งค่า VAT (%) :</label>
            <input type="number" id="vatPercentInput" value="10" oninput="calculateAll()">
        </div>
        <div class="form-control">
            <label>ส่วนลดรวม (บาท) :</label>
            <input type="number" id="totalDiscount" placeholder="0" oninput="calculateAll()">
        </div>
        <div class="form-control full-width">
            <label>ยอดรวมก่อนแวต (ดูเช็กบิลร้าน) :</label>
            <input type="number" id="checkTotalAmount" placeholder="0.00" style="background-color: #fdfefe;" readonly>
        </div>
    </div>

    <!-- กล่องสรุปยอด -->
    <div class="summary-box">
        <div class="summary-row">
            <span>รวมยอดหลัง VAT:</span>
            <span id="totalWithVatText" style="color:#2980b9;">0.00 บาท</span>
        </div>
        <div class="summary-row">
            <span>ส่วนลดคิดเป็น:</span>
            <span id="discountPercentText" style="color:#e67e22;">0.0000 %</span>
        </div>
        <div class="summary-row" style="border-top: 1px dashed #ccc; padding-top: 6px; margin-top: 4px; font-size: 15px;">
            <span>ยอดสุทธิทั้งหมด:</span>
            <span id="netPayableText" style="color:#27ae60;">0.00 บาท</span>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <h3>รายชื่อและค่าอาหาร</h3>
    <button class="btn btn-add" onclick="addPersonRow()">➕ เพิ่มคน / รายการ</button>

    <!-- ตารางแบบสไลด์บนมือถือได้ -->
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th style="width: 80px;">ชื่อ</th>
                    <th style="width: 85px;">ค่าอาหารดิบ</th>
                    <th>Vat</th>
                    <th>รวม Vat</th>
                    <th>ส่วนลด</th>
                    <th class="txt-red">จ่ายจริง</th>
                    <th style="width: 50px;">ลบ</th>
                </tr>
            </thead>
            <tbody id="personTableBody">
                <!-- แถวข้อมูลถูกเติมโดย JavaScript -->
            </tbody>
            <tfoot>
                <tr class="total-row">
                    <td>รวม</td>
                    <td id="sumOriginal">0.00</td>
                    <td id="sumVat">0.00</td>
                    <td id="sumWithVat">0.00</td>
                    <td id="sumDiscount">0.00</td>
                    <td id="sumFinal" class="txt-red">0.00</td>
                    <td>-</td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<script>
    window.onload = function() {
        // ค่าตัวอย่างตามรูปเดิม
        addPersonRow(285);
        addPersonRow(199);
        addPersonRow(199);
        addPersonRow(139);
        addPersonRow(139);
        
        document.getElementById('vatPercentInput').value = 10;
        document.getElementById('totalDiscount').value = 200;
        calculateAll();
    };

    function addPersonRow(initialValue = '') {
        const tbody = document.getElementById('personTableBody');
        const rowCount = tbody.rows.length + 1;
        
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" placeholder="คนที่ ${rowCount}" style="width:100%; padding:5px; border-radius:6px; border:1px solid #ccc; font-size:13px; box-sizing:border-box;"></td>
            <td><input type="number" class="person-cost" value="${initialValue}" placeholder="0" style="width:100%; padding:5px; border-radius:6px; border:1px solid #ccc; font-size:13px; box-sizing:border-box;" oninput="calculateAll()"></td>
            <td class="row-vat">0.0</td>
            <td class="row-with-vat">0.0</td>
            <td class="row-discount">0.00</td>
            <td class="row-final txt-red">0.00</td>
            <td><button class="btn btn-danger" onclick="removeRow(this)">×</button></td>
        `;
        tbody.appendChild(tr);
        calculateAll();
    }

    function removeRow(button) {
        button.closest('tr').remove();
        calculateAll();
    }

    function calculateAll() {
        const vatPercent = parseFloat(document.getElementById('vatPercentInput').value) || 0;
        const totalDiscount = parseFloat(document.getElementById('totalDiscount').value) || 0;
        
        const rows = document.querySelectorAll('#personTableBody tr');
        
        let sumOriginal = 0;
        let sumVat = 0;
        let sumWithVat = 0;

        rows.forEach(row => {
            const cost = parseFloat(row.querySelector('.person-cost').value) || 0;
            const vat = (cost * vatPercent) / 100;
            const costWithVat = cost + vat;

            sumOriginal += cost;
            sumVat += vat;
            sumWithVat += costWithVat;
        });

        document.getElementById('checkTotalAmount').value = sumOriginal.toFixed(2);
        document.getElementById('totalWithVatText').innerText = sumWithVat.toFixed(2) + ' บาท';

        let discountPercent = 0;
        if (sumWithVat > 0) {
            discountPercent = (totalDiscount / sumWithVat) * 100;
        }
        document.getElementById('discountPercentText').innerText = discountPercent.toFixed(4) + ' %';
        document.getElementById('netPayableText').innerText = (sumWithVat - totalDiscount).toFixed(2) + ' บาท';

        let totalFinalSum = 0;
        let totalDiscountSum = 0;

        rows.forEach(row => {
            const cost = parseFloat(row.querySelector('.person-cost').value) || 0;
            const vat = (cost * vatPercent) / 100;
            const costWithVat = cost + vat;

            const personDiscount = (costWithVat * discountPercent) / 100;
            const finalPay = costWithVat - personDiscount;

            row.querySelector('.row-vat').innerText = vat.toFixed(1);
            row.querySelector('.row-with-vat').innerText = costWithVat.toFixed(1);
            row.querySelector('.row-discount').innerText = personDiscount.toFixed(4);
            row.querySelector('.row-final').innerText = finalPay.toFixed(2);

            totalDiscountSum += personDiscount;
            totalFinalSum += finalPay;
        });

        document.getElementById('sumOriginal').innerText = sumOriginal.toFixed(0);
        document.getElementById('sumVat').innerText = sumVat.toFixed(1);
        document.getElementById('sumWithVat').innerText = sumWithVat.toFixed(1);
        document.getElementById('sumDiscount').innerText = totalDiscountSum.toFixed(0);
        document.getElementById('sumFinal').innerText = totalFinalSum.toFixed(1);
    }
</script>

</body>
</html>
